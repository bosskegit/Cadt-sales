<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR+OCR Capture Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#0b1220;color:#e8edf5;font-family:-apple-system,sans-serif;}
  #wrap{max-width:520px;margin:0 auto;padding:14px;}
  h1{font-size:17px;margin:0 0 4px;}
  p.sub{font-size:13px;color:#8a93a6;margin:0 0 14px;}
  .camWrap{position:relative;border-radius:12px;overflow:hidden;background:#000;}
  video{width:100%;display:block;}
  /* Pure CSS visual aid only — this overlay does NOT crop or restrict what actually gets captured or
     analyzed. The capture below always grabs the full video frame; the frame is just there to help you
     aim, same as this test is meant to confirm. */
  .frameMask{position:absolute;inset:0;pointer-events:none;}
  .frameMask::before{
    content:'';position:absolute;inset:0;
    background:
      linear-gradient(transparent,transparent) padding-box,
      radial-gradient(transparent,transparent) border-box;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.45);
    top:12%;bottom:12%;left:8%;right:8%;
    border:3px solid #4da3ff;border-radius:14px;
  }
  .frameLabel{position:absolute;top:8%;left:0;right:0;text-align:center;color:#cfe3ff;font-size:13px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
  #canvas{display:none;}
  button{width:100%;padding:14px;margin-top:12px;border:0;border-radius:10px;font-size:16px;font-weight:600;background:#4da3ff;color:#08101f;}
  button:disabled{opacity:0.5;}
  .resultBox{margin-top:14px;padding:12px;border-radius:10px;background:#161f33;border:1px solid #29354d;}
  .resultBox h3{margin:0 0 6px;font-size:13px;color:#8a93a6;text-transform:uppercase;letter-spacing:0.4px;}
  .resultBox pre{white-space:pre-wrap;word-break:break-word;margin:0;font-size:14px;font-family:inherit;}
  .status{font-size:13px;color:#8a93a6;margin-top:10px;min-height:18px;}
  .ok{color:#7ee08a;}
</style>
</head>
<body>
<div id="wrap">
  <h1>QR + OCR — one capture, both readers</h1>
  <p class="sub">Test page only — doesn't touch the real app. Frame your shot, tap Capture once, both QR and text reading run on the exact same photo.</p>

  <div class="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="frameMask"></div>
    <div class="frameLabel">Fit badge inside the frame</div>
  </div>
  <canvas id="canvas"></canvas>

  <button id="captureBtn">📸 Capture</button>
  <div class="status" id="status"></div>

  <div class="resultBox">
    <h3>QR Code</h3>
    <pre id="qrResult">—</pre>
  </div>
  <div class="resultBox">
    <h3>Text (OCR)</h3>
    <pre id="ocrResult">—</pre>
  </div>
</div>

<script>
let stream=null;
async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    document.getElementById('video').srcObject=stream;
  }catch(e){
    document.getElementById('status').textContent='Camera error: '+e.message;
  }
}
startCamera();

function setStatus(t,ok){
  const el=document.getElementById('status');
  el.textContent=t;
  el.className='status'+(ok?' ok':'');
}

// Same polarity/rotation approach as the real app's bestOcrResult — tries normal+inverted at 0°/90°
// and keeps whichever Tesseract is most confident about, rather than guessing from brightness.
function invertedDataUrl(dataUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const c=document.createElement('canvas');
        c.width=img.width;c.height=img.height;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0);
        const id=ctx.getImageData(0,0,c.width,c.height);
        const d=id.data;
        for(let i=0;i<d.length;i+=4){
          const gray=255-(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
          d[i]=d[i+1]=d[i+2]=gray;
        }
        ctx.putImageData(id,0,0);
        resolve(c.toDataURL('image/jpeg',0.92));
      }catch(e){resolve(null);}
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}
function rotatedDataUrl(dataUrl,deg){
  return new Promise((resolve)=>{
    if(deg===0){resolve(dataUrl);return;}
    const img=new Image();
    img.onload=()=>{
      try{
        const c=document.createElement('canvas');
        c.width=img.height;c.height=img.width;
        const ctx=c.getContext('2d');
        ctx.translate(c.width/2,c.height/2);
        ctx.rotate(deg*Math.PI/180);
        ctx.drawImage(img,-img.width/2,-img.height/2);
        resolve(c.toDataURL('image/jpeg',0.85));
      }catch(e){resolve(null);}
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}
async function bestOcr(dataUrl){
  const inverted=await invertedDataUrl(dataUrl);
  const sources=[dataUrl,inverted].filter(Boolean);
  let best=null;
  for(const src of sources){
    for(const deg of [0,90]){
      const rotated=await rotatedDataUrl(src,deg);
      if(!rotated)continue;
      try{
        const r=await Tesseract.recognize(rotated,'eng',{logger:()=>{}});
        const text=(r?.data?.text||'').trim();
        const conf=r?.data?.confidence||0;
        if(text.length>=2&&(!best||conf>best.conf))best={text,conf};
      }catch(e){}
    }
  }
  return best;
}

document.getElementById('captureBtn').addEventListener('click',async()=>{
  const video=document.getElementById('video');
  const canvas=document.getElementById('canvas');
  if(!video.videoWidth){setStatus('Camera not ready yet, try again in a second.');return;}
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const dataUrl=canvas.toDataURL('image/jpeg',0.92);

  document.getElementById('captureBtn').disabled=true;
  document.getElementById('qrResult').textContent='—';
  document.getElementById('ocrResult').textContent='Reading…';
  setStatus('Captured one photo — running QR + text reading on it now…');

  // QR — instant, runs on the raw pixel data straight away
  const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const qrCode=window.jsQR?window.jsQR(imageData.data,imageData.width,imageData.height):null;
  document.getElementById('qrResult').textContent=qrCode?qrCode.data:'No QR code found in this shot.';

  // OCR — slower, runs on the SAME captured photo, not a second shot
  try{
    const result=await bestOcr(dataUrl);
    document.getElementById('ocrResult').textContent=result&&result.text?result.text:'No readable text found.';
  }catch(e){
    document.getElementById('ocrResult').textContent='OCR error: '+e.message;
  }

  setStatus('Done — one capture, both results above.','ok');
  document.getElementById('captureBtn').disabled=false;
});
</script>
</body>
</html>
